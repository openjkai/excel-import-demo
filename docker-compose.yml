services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: excel_import_app
    volumes:
      - .:/var/www/html
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - excel_import

  nginx:
    image: nginx:alpine
    container_name: excel_import_nginx
    ports:
      - "8090:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - excel_import

  mysql:
    image: mysql:8.0
    container_name: excel_import_mysql
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: excel_import
      MYSQL_USER: laravel
      MYSQL_PASSWORD: secret
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-psecret"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - excel_import

  queue:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: excel_import_queue
    command: php artisan queue:work --tries=3 --timeout=300
    volumes:
      - .:/var/www/html
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - excel_import
    restart: unless-stopped

volumes:
  mysql_data:

networks:
  excel_import:
    driver: bridge
